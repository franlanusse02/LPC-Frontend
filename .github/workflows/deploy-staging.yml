name: Deploy staging site to GitHub Pages

on:
  push:
    branches: ["staging"]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging site
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
          NEXT_PUBLIC_BASE_PATH: /staging

      - name: Publish staging files to gh-pages/staging
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          temp_dir="$(mktemp -d)"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git clone --depth 1 --branch gh-pages "$repo_url" "$temp_dir"; then
            echo "Using existing gh-pages branch"
          else
            git clone --depth 1 "$repo_url" "$temp_dir"
            git -C "$temp_dir" switch --orphan gh-pages
            git -C "$temp_dir" rm -rf . || true
          fi

          mkdir -p "$temp_dir/staging"
          touch "$temp_dir/.nojekyll"
          rsync -a --delete \
            --exclude ".git" \
            ./out/ "$temp_dir/staging/"

          git -C "$temp_dir" add -A
          if git -C "$temp_dir" diff --cached --quiet; then
            echo "No staging changes to publish"
            exit 0
          fi

          git -C "$temp_dir" commit -m "Deploy staging from ${GITHUB_SHA}"
          git -C "$temp_dir" push origin gh-pages
